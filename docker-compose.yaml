services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: swishdish
      POSTGRES_PASSWORD: swishdish_dev
      POSTGRES_DB: swishdish
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swishdish"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./swishdish-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://swishdish:swishdish_dev@db:5432/swishdish?sslmode=disable
      JWT_SECRET: dev-jwt-secret-change-in-production-32bytes
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
